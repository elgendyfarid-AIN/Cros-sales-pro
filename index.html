<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PharmaCross Pro 2026</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --primary: #1a5d43; /* أخضر صيدلاني داكن */
            --accent: #0056b3; /* أزرق طبي */
            --light-gray: #f8f9fa;
            --border: #dddddd;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding-bottom: 50px;
        }

        /* تنسيق العنوان الرئيسي - واضح جداً في الشمس */
        .header {
            background: var(--primary);
            color: white;
            padding: 25px 15px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .header h1 { font-size: 28px; font-weight: 800; }

        .container { padding: 15px; max-width: 800px; margin: auto; }

        /* البحث والقائمة */
        .search-box {
            width: 100%; padding: 15px; margin: 20px 0;
            border: 3px solid var(--primary); border-radius: 12px;
            font-size: 18px; font-weight: bold; background: var(--light-gray);
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }

        .item-btn {
            background: white; border: 2px solid var(--border); padding: 20px 10px;
            border-radius: 12px; text-align: center; font-weight: 800;
            font-size: 16px; cursor: pointer; transition: 0.2s;
        }

        .item-btn:active { transform: scale(0.95); background: #eee; }

        /* نافذة الحالة */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 1000; overflow-y: auto; padding: 15px;
        }

        .back-btn {
            background: var(--text); color: white; border: none; padding: 10px 20px;
            border-radius: 8px; font-weight: bold; margin-bottom: 15px; cursor: pointer;
        }

        .condition-title { color: var(--primary); font-size: 24px; font-weight: 800; margin-bottom: 20px; border-bottom: 4px solid var(--primary); display: inline-block; }

        /* قائمة المكملات كأزرار بجانب بعضها */
        .supp-nav {
            display: flex; gap: 8px; overflow-x: auto; padding: 10px 0;
            margin-bottom: 20px; border-bottom: 1px solid #eee;
        }

        .supp-pill {
            background: var(--light-gray); border: 2px solid var(--primary);
            padding: 8px 15px; border-radius: 20px; white-space: nowrap;
            font-weight: bold; font-size: 14px; cursor: pointer; color: var(--primary);
        }

        .supp-pill.active { background: var(--primary); color: white; }

        /* صندوق تفاصيل المكمل المفتوح */
        .detail-card {
            background: #fff; border: 2px solid var(--border);
            padding: 20px; border-radius: 15px; margin-bottom: 25px;
            display: none; animation: slideIn 0.3s ease;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .detail-card h3 { color: var(--accent); margin-bottom: 10px; font-size: 20px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .detail-row { margin-bottom: 8px; font-size: 16px; }
        .detail-row b { color: var(--primary); }

        .warning-zone { background: #fff0f0; border: 2px solid #ff0000; padding: 15px; border-radius: 12px; margin-top: 20px; }
        .zatouna-zone { background: #f0f7ff; border: 2px solid var(--accent); padding: 15px; border-radius: 12px; margin-top: 15px; font-style: italic; }
    </style>
</head>
<body>

    <div class="header">
        <h1>PharmaCross Pro</h1>
        <p>مرجع الصيدلي الذكي (إصدار الإمارات 2026)</p>
    </div>

    <div class="container">
        <input type="text" id="search" class="search-box" placeholder="ابحث عن حالة مرضية...">
        
        <div class="grid" id="mainGrid">
            </div>
    </div>

    <div id="modal" class="modal">
        <div class="container">
            <button class="back-btn" onclick="closeModal()">⬅️ القائمة الرئيسية</button>
            <div id="modalContent"></div>
        </div>
    </div>

    <script>
        // قاعدة البيانات المخزنة محلياً (مثال حالة الضغط بكل المكملات)
        const DATA = [
            {
                id: "htn",
                name: "ضغط الدم المرتفع",
                warnings: "تجنب المسكنات (NSAIDs) وفوارات الصوديوم وأدوية البرد التي تحتوي على سودوفيدرين.",
                zatouna: "قل للمريض: دواء الضغط هو حمايتك من (القاتل الصامت)، التزامك به يعني حياة آمنة لشرايينك وقلبك.",
                supplements: [
                    {
                        title: "أوميجا 3",
                        active: "EPA / DHA",
                        dose: "1000 - 2000 مجم يومياً",
                        benefit: "يحسن مرونة الشرايين ويخفض الدهون الثلاثية.",
                        timing: "وسط أكبر وجبة (غداء عالي الدهون).",
                        brands: "iRemedies iUltimate Omega | Avernus Omega-3 | Seven Seas | Solgar"
                    },
                    {
                        title: "المغنيسيوم",
                        active: "Magnesium Glycinate",
                        dose: "200 - 400 مجم",
                        benefit: "باسط طبيعي للأوعية الدموية ومنظم لضربات القلب.",
                        timing: "قبل النوم مباشرة.",
                        brands: "iRemedies iMagnesium Glycinate | Bio-Magnesium"
                    },
                    {
                        title: "إنزيم كيو 10",
                        active: "CoQ10",
                        dose: "100 - 200 مجم",
                        benefit: "ضروري لمرضى الضغط الذين يستخدمون أدوية الكوليسترول.",
                        timing: "بعد وجبة دسمة.",
                        brands: "iRemedies iCoQ10 | Avernus CoQ10"
                    },
                    {
                        title: "مستخلص الثوم",
                        active: "Garlic Extract (Allicin)",
                        dose: "600 - 1200 مجم",
                        benefit: "يقلل تصلب الشرايين ويحسن تدفق الدم.",
                        timing: "مرة يومياً.",
                        brands: "iRemedies iGarlic (بدون رائحة)"
                    },
                    {
                        title: "فيتامين د3",
                        active: "Vitamin D3",
                        dose: "1000 - 5000 IU (حسب الفحص)",
                        benefit: "يدعم صحة القلب والشرايين.",
                        timing: "بعد وجبة غنية بالدهون.",
                        brands: "Avernus Vitamin D3 | iRemedies D3"
                    }
                ]
            }
        ];

        function init() {
            const grid = document.getElementById('mainGrid');
            DATA.forEach(item => {
                const btn = document.createElement('div');
                btn.className = 'item-btn';
                btn.innerText = item.name;
                btn.onclick = () => openCondition(item);
                grid.appendChild(btn);
            });
        }

        function openCondition(item) {
            const modal = document.getElementById('modal');
            const content = document.getElementById('modalContent');
            
            let suppPills = item.supplements.map((s, idx) => 
                `<div class="supp-pill" onclick="showSuppDetail(${idx}, '${item.id}')">${s.title}</div>`
            ).join('');

            content.innerHTML = `
                <div class="condition-title">${item.name}</div>
                <p style="font-weight:bold; margin-bottom:10px">اختر المكمل لعرض التفاصيل:</p>
                <div class="supp-nav">${suppPills}</div>
                <div id="suppDetailArea"></div>

                <div class="warning-zone">
                    <b>⚠️ خط أحمر (تحذيرات):</b><br>${item.warnings}
                </div>
                <div class="zatouna-zone">
                    <b>🌟 نصيحة الصيدلي (الزتونة):</b><br>${item.zatouna}
                </div>
            `;
            modal.style.display = 'block';
        }

        function showSuppDetail(idx, conditionId) {
            const item = DATA.find(c => c.id === conditionId);
            const supp = item.supplements[idx];
            const area = document.getElementById('suppDetailArea');

            // تحديث الأزرار (Active state)
            const pills = document.querySelectorAll('.supp-pill');
            pills.forEach((p, i) => p.className = (i === idx) ? 'supp-pill active' : 'supp-pill');

            area.innerHTML = `
                <div class="detail-card" style="display:block">
                    <h3>${supp.title}</h3>
                    <div class="detail-row"><b>المادة الفعالة:</b> ${supp.active}</div>
                    <div class="detail-row"><b>التركيز/الجرعة:</b> ${supp.dose}</div>
                    <div class="detail-row"><b>الفائدة الطبية:</b> ${supp.benefit}</div>
                    <div class="detail-row"><b>التوقيت الأمثل:</b> ${supp.timing}</div>
                    <div class="detail-row"><b>أمثلة الخيارات:</b><br>${supp.brands}</div>
                </div>
            `;
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        init();
    </script>
</body>
</html>
