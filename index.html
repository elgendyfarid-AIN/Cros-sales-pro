let lang='ar', sec='c', cond=null, si=null, dk=false;

const $ = id => document.getElementById(id);

function gD(){ return DATA[lang]; }
function gL(){ return gD().L; }

function grid(){ $('vGrid').style.display='block'; $('vDetail').style.display='none'; }
function detail(){ $('vGrid').style.display='none'; $('vDetail').style.display='block'; }

function setL(l){
  lang=l; sec='c'; cond=null; si=null;
  const L=gL();
  document.body.className=(l==='ar'?'ar':'en')+(dk?' dk':'');
  $('bAr').className='lb'+(l==='ar'?' ac':'');
  $('bEn').className='lb'+(l==='en'?' ac':'');
  $('tbn').textContent=L.logo;
  $('tbs').textContent=L.sub;
  $('si').placeholder=L.search;
  $('bkT').textContent=L.back;
  $('bkA').textContent=L.bA;
  $('sr').classList.remove('on');
  $('si').value='';
  grid();
  renderSecs();
  renderGrid();
  localStorage.setItem('pa_l',l);
}

function toggleDk(){
  dk=!dk;
  document.body.className=(lang==='ar'?'ar':'en')+(dk?' dk':'');
  $('dkb').textContent=dk?'☀️':'🌙';
  localStorage.setItem('pa_dk',dk);
}

function renderSecs(){
  const secs=gD().secs;
  $('stw').innerHTML=secs.map(s=>
    `<button class="st${s.id===sec?' ac':''}" onclick="selSec('${s.id}')">${s.icon} ${s.name}</button>`
  ).join('');
}

function selSec(id){
  sec=id; cond=null; si=null;
  renderSecs(); renderGrid(); grid();
}

function renderGrid(){
  const conds=gD().conds[sec]||[];
  if(!conds.length){ $('cg').innerHTML='<div class="empty">🚧 قريباً</div>'; return; }
  $('cg').innerHTML=conds.map(c=>
    `<div class="cc${cond&&cond.id===c.id?' ac':''}" onclick="selCond('${c.id}')">
      <div class="ci">${c.icon}</div>
      <div class="cn">${c.name}</div>
    </div>`
  ).join('');
}

function selCond(id){
  const conds=gD().conds[sec]||[];
  cond=conds.find(c=>c.id===id);
  if(!cond) return;
  si=null;
  renderGrid();
  renderDetail();
  detail();
  window.scrollTo({top:0,behavior:'smooth'});
}

function mkChips(c){
  return c.supps.map((s,i)=>
    `<button class="chip${si===i?' ac':''}" onclick="toggleS(event,${i})">${s.n}</button>`
  ).join('');
}

function mkPanel(c){
  if(si===null) return '';
  const L=gL(), s=c.supps[si];
  return `<div class="sdp">
    <div class="sdn">${s.n}</div>
    <div class="sdg">
      <div class="sdgi"><div class="sdgl">📊 ${L.dose}</div><div class="sdgv">${s.d}</div></div>
      <div class="sdgi"><div class="sdgl">⏰ ${L.timing}</div><div class="sdgv">${s.t}</div></div>
    </div>
    <div class="sdf">${s.f}<div class="sdbr">🏷️ ${L.brands}:<br>${s.b}</div></div>
  </div>`;
}

function renderDetail(){
  if(!cond) return;
  const L=gL(), c=cond;
  const tips=(c.tips||[]).map(t=>`<div class="li"><div class="lid"></div><div>${t}</div></div>`).join('');
  const warns=(c.warns||[]).map(w=>{
    const sv=w.startsWith('!');
    const tx=sv?w.slice(1):w;
    return `<div class="wi"><span style="font-size:14px">${sv?'🚨':'⚠️'}</span><div class="${sv?'wis':''}">${tx}</div></div>`;
  }).join('');

  $('dc').innerHTML=`
    <div class="dh"><div class="dt">${c.icon} ${c.name}</div><div class="ds">${L.ref}</div></div>
    <div class="ic gr">
      <div class="ich"><div class="ichi">🎯</div><div class="icht">${L.cs}</div></div>
      <div id="chipsrow" class="chips">${mkChips(c)}</div>
      <div id="suppanel">${mkPanel(c)}</div>
    </div>
    ${tips?`<div class="ic bl"><div class="ich"><div class="ichi">🌿</div><div class="icht">${L.tips}</div></div>${tips}</div>`:''}
    ${warns?`<div class="ic or"><div class="ich"><div class="ichi">⚠️</div><div class="icht">${L.warns}</div></div>${warns}</div>`:''}
    ${c.phrase?`<div class="ic tl"><div class="ich"><div class="ichi">📋</div><div class="icht">${L.phrase}</div></div><div class="ph">${c.phrase}</div></div>`:''}
    ${c.smart?`<div class="ic pu"><div class="ich"><div class="ichi">💡</div><div class="icht">${L.smart}</div></div><div class="sm">${c.smart}</div></div>`:''}
  `;
}

function toggleS(e,idx){
  e.stopPropagation();
  si=(si===idx?null:idx);
  const cr=document.getElementById('chipsrow');
  const sp=document.getElementById('suppanel');
  if(cr) cr.innerHTML=mkChips(cond);
  if(sp) sp.innerHTML=mkPanel(cond);
}

function goBack(){
  cond=null; si=null;
  grid(); renderGrid();
}

function doSearch(){
  const q=$('si').value.trim().toLowerCase();
  const sr=$('sr');
  if(!q){sr.classList.remove('on');return;}
  const db=gD();
  const matches=[];
  Object.entries(db.conds).forEach(([sid,cs])=>{
    const sname=db.secs.find(s=>s.id===sid)?.name||sid;
    cs.forEach(c=>{
      if(c.name.toLowerCase().includes(q)) matches.push({...c,sid,sname});
    });
  });
  if(!matches.length){sr.classList.remove('on');return;}
  sr.innerHTML=matches.slice(0,8).map(m=>
    `<div class="si" onclick="searchGo('${m.sid}','${m.id}')"><span>${m.icon} ${m.name}</span><span class="scat">${m.sname}</span></div>`
  ).join('');
  sr.classList.add('on');
}

function searchGo(sid,cid){
  $('sr').classList.remove('on');
  $('si').value='';
  sec=sid; cond=null; si=null;
  renderSecs();
  selCond(cid);
}

function clrS(){
  $('si').value='';
  $('sr').classList.remove('on');
}

window.onload=()=>{
  const dk0=localStorage.getItem('pa_dk')==='true';
  if(dk0){dk=true;$('dkb').textContent='☀️';}
  setL(localStorage.getItem('pa_l')||'ar');
};

document.addEventListener('click',e=>{
  if(!e.target.closest('.sb')&&!e.target.closest('.sr'))
    $('sr').classList.remove('on');
});
</script>
</body>
</html>
