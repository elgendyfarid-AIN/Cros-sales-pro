<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P-Cross Pro 2026 | المرجع الصيدلاني</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a5d43; /* أخضر طبي داكن */
            --accent: #0056b3; /* أزرق صيدلاني */
            --bg: #ffffff;
            --text-dark: #000000;
            --warning: #cc0000;
            --border-color: #bbbbbb;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }

        body { 
            background: var(--bg); 
            color: var(--text-dark); 
            padding: 10px;
            -webkit-font-smoothing: antialiased;
        }

        /* الهيدر المدمج */
        .top-nav {
            display: flex; align-items: center; gap: 10px;
            padding-bottom: 10px; border-bottom: 3px solid var(--primary);
            margin-bottom: 12px;
        }
        .brand-logo { font-weight: 900; color: var(--primary); font-size: 22px; }
        .search-input {
            flex: 1; padding: 12px; border: 2.5px solid var(--primary);
            border-radius: 10px; font-weight: bold; font-size: 16px; background: #fdfdfd;
        }

        /* شبكة الأمراض */
        .disease-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(105px, 1fr));
            gap: 8px; margin-bottom: 15px;
        }
        .disease-card {
            background: #f4f4f4; border: 1.5px solid var(--border-color);
            padding: 10px 5px; border-radius: 8px; text-align: center;
            font-size: 13px; font-weight: 800; cursor: pointer;
            box-shadow: 1px 1px 3px rgba(0,0,0,0.05);
        }
        .disease-card.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* منطقة التفاصيل - Dashboard */
        #details-dashboard {
            display: none; border: 3px solid var(--primary); border-radius: 15px;
            padding: 15px; background: #ffffff; animation: fadeIn 0.3s ease;
        }

        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .title-text { font-size: 22px; font-weight: 900; color: var(--primary); border-right: 5px solid var(--primary); padding-right: 10px; }
        .close-btn { background: #000; color: #fff; border: none; padding: 6px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; }

        /* أزرار المكملات (Pills) */
        .supp-pills { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
        .pill {
            background: #fff; border: 2.5px solid var(--accent); color: var(--accent);
            padding: 6px 14px; border-radius: 25px; font-size: 14px; font-weight: 900; cursor: pointer;
        }
        .pill.selected { background: var(--accent); color: white; }

        /* لوحة البيانات التفصيلية */
        .data-panel {
            background: #f9f9f9; border: 1px solid var(--border-color);
            padding: 15px; border-radius: 10px; display: none;
        }
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .data-cell { font-size: 15px; border-bottom: 1px solid #ddd; padding: 5px 0; }
        .data-cell b { color: var(--primary); display: block; font-size: 13px; margin-bottom: 2px; }
        .full-row { grid-column: span 2; }

        .brands-box { color: var(--accent); font-weight: 900; background: #eef2ff; padding: 8px; border-radius: 6px; margin-top: 5px; }

        /* التنبيهات والزتونة */
        .warning-strip {
            background: #fff0f0; border-right: 5px solid var(--warning);
            padding: 10px; margin-top: 15px; font-size: 14px; font-weight: bold; color: #333;
        }
        .zatouna-strip {
            background: #f0f7ff; border-right: 5px solid var(--accent);
            padding: 10px; margin-top: 8px; font-size: 14px; font-weight: 700; font-style: italic; color: #333;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="top-nav">
        <div class="brand-logo">P-Cross</div>
        <input type="text" id="searchInput" class="search-input" placeholder="ابحث عن حالة مرضية (مثلاً: سكري)...">
    </div>

    <div class="disease-grid" id="mainGrid"></div>

    <div id="details-dashboard">
        <div class="header-row">
            <div class="title-text" id="activeConditionName">اسم الحالة</div>
            <button class="close-btn" onclick="goBack()">إغلاق ✖</button>
        </div>

        <div class="supp-pills" id="pillContainer"></div>

        <div id="dataPanel" class="data-panel">
            <div class="data-grid">
                <div class="data-cell"><b>المادة الفعالة:</b> <span id="cell-active"></span></div>
                <div class="data-cell"><b>التركيز (mg):</b> <span id="cell-dose"></span></div>
                <div class="data-cell"><b>التوقيت الأمثل:</b> <span id="cell-time"></span></div>
                <div class="data-cell"><b>الفائدة الطبية بالتفصيل:</b> <span id="cell-benefit"></span></div>
                <div class="data-cell full-row"><b>أمثلة الخيارات (Brands):</b> <div class="brands-box" id="cell-brands"></div></div>
            </div>
        </div>

        <div class="warning-strip" id="activeWarn"></div>
        <div class="zatouna-strip" id="activeZatouna"></div>
    </div>

    <script>
        // قاعدة البيانات الضخمة والمفصلة
        const PHARMA_DATA = [
            {
                id: "htn",
                name: "ضغط الدم",
                warn: "تجنب المسكنات (NSAIDs) مثل Ibuprofen وفوارات الصوديوم وأدوية البرد التي تحتوي على Pseudoephedrine.",
                zatouna: "دواء الضغط هو (حارس الشرايين)، أخبر المريض أن الالتزام يقي من الجلطات الصامتة.",
                supps: [
                    { t: "أوميجا 3", a: "EPA (800mg) / DHA (600mg)", d: "1400 - 2000 مجم يومياً", tm: "وسط الوجبة الرئيسية (الغداء)", b: "يقلل الدهون الثلاثية، يحسن مرونة جدران الأوعية الدموية، ويقلل الالتهابات الوعائية.", br: "iRemedies iUltimate Omega | Avernus Omega-3 | Seven Seas" },
                    { t: "مغنيسيوم", a: "Magnesium Glycinate", d: "400 مجم يومياً", tm: "قبل النوم بـ 30 دقيقة", b: "يعمل كحاصر طبيعي لقنوات الكالسيوم مما يساعد في ارتخاء العضلات الملساء في الشرايين وخفض المقاومة الوعائية.", br: "iRemedies iMagnesium Glycinate | Bio-Magnesium" },
                    { t: "كيو 10", a: "Coenzyme Q10", d: "100 - 200 مجم", tm: "بعد الأكل (وجبة دسمة)", b: "يدعم طاقة عضلة القلب (ATP) ويحمي من الآثار الجانبية لأدوية الكوليسترول (Statins) المصاحبة.", br: "iRemedies iCoQ10 | Avernus CoQ10" },
                    { t: "مستخلص الثوم", a: "Garlic Extract (Allicin)", d: "1200 مجم", tm: "مرة واحدة يومياً", b: "يساعد في تحرير أكسيد النيتريك الذي يوسع الأوعية الدموية ويقلل تصلب الشرايين.", br: "iRemedies iGarlic (Odorless)" }
                ]
            },
            {
                id: "dm2",
                name: "السكري 2",
                warn: "يجب مراقبة قراءات السكر بانتظام، المكملات لا تغني عن الأنسولين أو الحبوب.",
                zatouna: "السكري لا يؤلم في البداية، لكن المكملات تحمي العين والكلى والأعصاب من التلف المستقبلي.",
                supps: [
                    { t: "B-Complex", a: "B1, B6, B12 (Active Forms)", d: "100 مجم / 1000 mcg", tm: "بعد الفطار", b: "حماية الغمد المياليني للأعصاب من التلف الناتج عن ارتفاع السكر (Diabetic Neuropathy).", br: "iRemedies iB-Complex | Neurobion Forte" },
                    { t: "ألفا ليبويك", a: "Alpha Lipoic Acid (ALA)", d: "600 مجم", tm: "على معدة فارغة (قبل الأكل بساعة)", b: "مضاد أكسدة قوي جداً يعيد بناء الأعصاب التالفة ويقلل من آلام وخدر الأطراف.", br: "ThioGamma | iRemedies ALA" },
                    { t: "كروميوم", a: "Chromium Picolinate", d: "200 - 500 mcg", tm: "قبل الوجبات بـ 20 دقيقة", b: "يزيد من حساسية مستقبلات الأنسولين في الخلايا مما يساعد في ضبط سكر الدم التراكمي.", br: "iRemedies iChromium | Avernus" }
                ]
            },
            {
                id: "anemia",
                name: "فقر الدم",
                warn: "تجنب تناول الشاي أو القهوة أو الكالسيوم مع الحديد بفاصل ساعتين على الأقل.",
                zatouna: "امتصاص الحديد يزداد مع فيتامين سي، أخبر المريض أن لون البراز سيتغير للأسود وهذا طبيعي.",
                supps: [
                    { t: "حديد", a: "Iron Bisglycinate (Gentle)", d: "25 - 50 مجم", tm: "قبل الأكل بساعة (أو مع فيتامين سي)", b: "رفع مخزون الفيريتين والهيموجلوبين في الدم دون التسبب في إمساك أو آلام معدة.", br: "iRemedies iIron | Avernus Gentle Iron" },
                    { t: "فيتامين سي", a: "Vitamin C (Buffered)", d: "500 - 1000 مجم", tm: "مع حبة الحديد", b: "يحول الحديد من الصيغة غير القابلة للامتصاص إلى صيغة سهلة الامتصاص في الأمعاء.", br: "iRemedies iVitamin C | Avernus" }
                ]
            }
        ];

        function renderMainGrid() {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = '';
            PHARMA_DATA.forEach(item => {
                const div = document.createElement('div');
                div.className = 'disease-card';
                div.innerText = item.name;
                div.onclick = () => showDashboard(item);
                grid.appendChild(div);
            });
        }

        function showDashboard(item) {
            document.getElementById('mainGrid').classList.add('hidden');
            document.getElementById('details-dashboard').style.display = 'block';
            document.getElementById('activeConditionName').innerText = item.name;
            document.getElementById('activeWarn').innerText = "⚠️ " + item.warn;
            document.getElementById('activeZatouna').innerText = "🌟 " + item.zatouna;

            const pillContainer = document.getElementById('pillContainer');
            pillContainer.innerHTML = '';
            item.supps.forEach((s, index) => {
                const pill = document.createElement('div');
                pill.className = 'pill';
                pill.innerText = s.t;
                pill.onclick = () => fillDataPanel(s, pill);
                pillContainer.appendChild(pill);
            });
            document.getElementById('dataPanel').style.display = 'none';
        }

        function fillDataPanel(supp, element) {
            document.querySelectorAll('.pill').forEach(p => p.classList.remove('selected'));
            element.classList.add('selected');

            document.getElementById('dataPanel').style.display = 'block';
            document.getElementById('cell-active').innerText = supp.a;
            document.getElementById('cell-dose').innerText = supp.d;
            document.getElementById('cell-time').innerText = supp.tm;
            document.getElementById('cell-benefit').innerText = supp.b;
            document.getElementById('cell-brands').innerText = supp.br;
        }

        function goBack() {
            document.getElementById('mainGrid').classList.remove('hidden');
            document.getElementById('details-dashboard').style.display = 'none';
        }

        // تشغيل الشبكة عند التحميل
        renderMainGrid();

        // تفعيل البحث
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase();
            const filtered = PHARMA_DATA.filter(item => item.name.toLowerCase().includes(term));
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = '';
            filtered.forEach(item => {
                const div = document.createElement('div');
                div.className = 'disease-card';
                div.innerText = item.name;
                div.onclick = () => showDashboard(item);
                grid.appendChild(div);
            });
        });
    </script>
</body>
</html>
