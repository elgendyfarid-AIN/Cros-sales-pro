                        phrase: "\"مزيج البربرين والـ ALA هو الأقوى لحماية أعصابك وضبط سكرك\"",
                        smart: "شرائط قياس سكر إضافية للمتابعة الدقيقة"
                    }
                    // هنا سنضيف باقي الـ 180 حالة بنفس النمط

                            {n:"أوميغا 3", d:"2000mg", t:"مع الأكل", f:"يقلل تيبس المفاصل الصباحي.", b:"Avernus | Now"},
                            {n:"MSM", d:"1000mg", t:"يومياً", f:"مهم جداً لمرونة الأربطة والأوتار.", b:"Solgar | Now"},
                            {n:"حمض الهيالورونيك", d:"100mg", t:"يومياً", f:"يعمل كمزيت طبيعي للسائل الزلالي.", b:"iRemedies | Now"}
                        ],
                        tips: ["تقليل الوزن يخفف الضغط", "تمارين سباحة خفيفة"],
                        warns: ["⚠️ الكركمين مع وارفارين يحتاج حذر", "الجلوكوزامين قد يرفع السكر قليلاً"],

                        smart: "ركبة طبية أو دهان مسكن موضعي"

        en: {

            sections: [ {id:"c", icon:"🫀", name:"Chronic"}, {id:"o", icon:"💊", name:"OTC"}, {id:"sk", icon:"🧴", name:"Skin"}, {id:"h", icon:"💆", name:"Hair"}, {id:"s", icon:"👶", name:"Special"}, {id:"g", icon:"🌿", name:"Health"} ],

    let lang='ar', curSec='c', curCond=null, activeSuppIdx=null, dk=false;

    function setL(l){
        lang=l; curSec='c'; curCond=null; activeSuppIdx=null;
        const L=DB[lang].L;
        document.body.className=(l==='ar'?'ar':'en')+(dk?' dk':'');
        document.getElementById('tbn').textContent=L.logo;
        document.getElementById('si').placeholder=L.search;
        document.getElementById('bkT').textContent=L.back;
        document.getElementById('bkA').textContent=L.backA;
        document.getElementById('bAr').className='lb'+(l==='ar'?' ac':'');
        document.getElementById('bEn').className='lb'+(l==='en'?' ac':'');
        renderSections(); renderGrid(); goBack();
    }

    function toggleDk(){
        dk=!dk; document.body.classList.toggle('dk');
        document.getElementById('dkb').textContent=dk?'☀️':'🌙';
    }

    function renderSections(){
        const secs=DB[lang].sections;
        document.getElementById('stw').innerHTML=secs.map(s=> 
            `<button class="st${s.id===curSec?' ac':''}" onclick="selectSec('${s.id}')">${s.icon} ${s.name}</button>`
        ).join('');
    }

    function selectSec(id){ curSec=id; renderSections(); renderGrid(); goBack(); }

    function renderGrid(){
        const conds=DB[lang].conditions[curSec]||[];
        document.getElementById('cg').innerHTML=conds.map(c=> `
            <div class="cc" onclick="showDetail('${c.id}')">
                <div class="ci">${c.icon}</div>
                <div class="cn">${c.name}</div>
            </div>
        `).join('');
    }

    function showDetail(id){
        const cond=DB[lang].conditions[curSec].find(c=>c.id===id);
        if(!cond) return;
        curCond=cond; activeSuppIdx=null;
        document.getElementById('cw').style.display='none';
        document.getElementById('dw').classList.add('on');
        renderDetail();
    }

    function renderDetail(){
        const L=DB[lang].L; const c=curCond;
        const chips=c.supps.map((s,i)=> `<button class="chip${activeSuppIdx===i?' ac':''}" onclick="toggleSupp(${i})">${s.n}</button>`).join('');
        
        let suppHTML='';
        if(activeSuppIdx!==null){
            const s=c.supps[activeSuppIdx];
            suppHTML=`<div class="sdp"><div class="sdn">${s.n}</div><div class="sdg">
                <div class="sdgi"><div class="sdgl">${L.dose}</div><div class="sdgv">${s.d}</div></div>
                <div class="sdgi"><div class="sdgl">${L.timing}</div><div class="sdgv">${s.t}</div></div>
            </div><div class="sdf">${s.f}</div><div class="sdbr">🏷️ ${L.brands}: ${s.b}</div></div>`;
        }

        document.getElementById('dc').innerHTML=`
            <div class="dh"><div class="dt">${c.icon} ${c.name}</div></div>
            <div class="ic gr"><div class="ich"><div class="icht">${L.cs}</div></div><div class="chips">${chips}</div>${suppHTML}</div>
            <div class="ic bl"><div class="ich"><div class="icht">${L.tips}</div></div>${c.tips.map(t=>`<div class="li">🔹 ${t}</div>`).join('')}</div>
            <div class="ic or"><div class="ich"><div class="icht">${L.warns}</div></div>${c.warns.map(w=>`<div class="wi">⚠️ ${w}</div>`).join('')}</div>
            <div class="ic"><div class="ph">${c.phrase}</div></div>
            <div class="ic"><div class="sm">💡 ${c.smart}</div></div>
        `;
    }

    function toggleSupp(i){ activeSuppIdx=(activeSuppIdx===i?null:i); renderDetail(); }

    function goBack(){
        document.getElementById('cw').style.display='block';
        document.getElementById('dw').classList.remove('on');
    }

    function doSearch(){
        const q=document.getElementById('si').value.toLowerCase();
        const res=document.getElementById('sr');
        if(!q){res.classList.remove('on'); return;}
        let matches=[];
        Object.values(DB[lang].conditions).flat().forEach(c=>{ if(c.name.toLowerCase().includes(q)) matches.push(c); });
        res.innerHTML=matches.map(m=>`<div class="si" onclick="showDetailFromSearch('${m.id}')">${m.icon} ${m.name}</div>`).join('');
        res.classList.add('on');
    }

    function showDetailFromSearch(id){
        document.getElementById('si').value=''; document.getElementById('sr').classList.remove('on');
        for(let s in DB[lang].conditions){
            let found=DB[lang].conditions[s].find(c=>c.id===id);
            if(found){ curSec=s; selectSec(s); showDetail(id); break; }
        }
    }

    window.onload=()=>setL('ar');
</script>
