<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PharmaCross Pro | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a5d43;
            --accent: #0056b3;
            --bg: #ffffff;
            --light-bg: #f2f2f2;
            --text: #000000;
            --border: #cccccc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }

        body { background: var(--bg); color: var(--text); padding: 10px; }

        /* الهيدر والبحث في سطر واحد لتوفير المساحة */
        .top-bar {
            display: flex; align-items: center; gap: 10px;
            padding-bottom: 10px; border-bottom: 2px solid var(--primary); margin-bottom: 10px;
        }
        .search-box {
            flex: 1; padding: 10px; border: 2px solid var(--primary);
            border-radius: 8px; font-weight: bold; font-size: 16px;
        }

        /* شبكة الحالات - صغيرة ومكثفة */
        .condition-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 8px; margin-bottom: 15px;
        }
        .cond-btn {
            background: var(--light-bg); border: 1.5px solid var(--border);
            padding: 8px 4px; border-radius: 8px; text-align: center;
            font-size: 13px; font-weight: 700; cursor: pointer;
        }
        .cond-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* منطقة تفاصيل الحالة - Dashboard */
        #details-area {
            display: none; border: 2px solid var(--primary); border-radius: 12px;
            padding: 12px; background: #fff;
        }

        .cond-name { font-size: 20px; font-weight: 900; color: var(--primary); margin-bottom: 10px; }

        /* رص المكملات بجانب بعضها */
        .supp-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 15px; }
        .supp-tag {
            background: #fff; border: 2px solid var(--accent); color: var(--accent);
            padding: 5px 12px; border-radius: 20px; font-size: 14px; font-weight: 800; cursor: pointer;
        }
        .supp-tag.selected { background: var(--accent); color: white; }

        /* لوحة المعلومات - تظهر بمجرد الضغط على المكمل */
        .info-panel {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            background: #fafafa; border: 1px solid #eee; padding: 10px; border-radius: 8px;
        }
        .info-item { font-size: 14px; border-bottom: 1px solid #ddd; padding: 4px 0; }
        .info-item b { color: var(--primary); display: block; font-size: 12px; }

        .full-width { grid-column: span 2; }

        .warning-strip {
            background: #ffeeee; border-right: 4px solid #cc0000;
            padding: 8px; margin-top: 10px; font-size: 13px; font-weight: bold;
        }
        .zatouna-strip {
            background: #eef7ff; border-right: 4px solid var(--accent);
            padding: 8px; margin-top: 5px; font-size: 13px; font-style: italic;
        }

        .brand-list { color: var(--accent); font-weight: 900; font-size: 14px; margin-top: 5px; }

        /* إخفاء القائمة عند فتح التفاصيل (اختياري) */
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div style="font-weight: 900; color: var(--primary); font-size: 18px;">P-Cross</div>
        <input type="text" id="search" class="search-box" placeholder="ابحث...">
    </div>

    <div class="condition-grid" id="mainGrid"></div>

    <div id="details-area">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <div class="cond-name" id="display-name">الحالة</div>
            <button onclick="backToList()" style="padding: 5px 10px; border-radius: 5px; background: #000; color:#fff; border:none; font-size:12px">إغلاق ✖</button>
        </div>

        <div class="supp-tags" id="suppList"></div>

        <div id="infoBox" style="display: none;">
            <div class="info-panel">
                <div class="info-item"><b>المادة الفعالة:</b> <span id="val-active"></span></div>
                <div class="info-item"><b>التركيز:</b> <span id="val-dose"></span></div>
                <div class="info-item"><b>التوقيت:</b> <span id="val-time"></span></div>
                <div class="info-item"><b>الفائدة:</b> <span id="val-benefit"></span></div>
                <div class="info-item full-width"><b>خيارات البراندات:</b> <div class="brand-list" id="val-brands"></div></div>
            </div>
        </div>

        <div class="warning-strip" id="val-warn"></div>
        <div class="zatouna-strip" id="val-zatouna"></div>
    </div>

    <script>
        const DATA = [
            {
                id: "htn",
                name: "ضغط الدم",
                warn: "تجنب المسكنات (NSAIDs) وفوارات الصوديوم وأدوية البرد.",
                zatouna: "دواء الضغط هو حمايتك من (القاتل الصامت)، لا تتوقف عنه أبداً.",
                supps: [
                    { t: "أوميجا 3", a: "EPA / DHA", d: "1-2 جم", b: "مرونة الشرايين", tm: "وسط الغداء", br: "iRemedies iUltimate Omega | Avernus Omega-3 | Seven Seas" },
                    { t: "مغنيسيوم", a: "Glycinate", d: "400 مجم", b: "باسط للأوعية", tm: "قبل النوم", br: "iRemedies iMagnesium | Bio-Magnesium" },
                    { t: "كيو 10", a: "CoQ10", d: "200 مجم", b: "طاقة عضلة القلب", tm: "بعد الأكل", br: "iRemedies iCoQ10 | Avernus CoQ10" },
                    { t: "ثوم", a: "Allicin", d: "1200 مجم", b: "سيولة وتدفق الدم", tm: "مرة يومياً", br: "iRemedies iGarlic" }
                ]
            },
            {
                id: "dm2",
                name: "السكري 2",
                warn: "يجب فحص السكر بانتظام عند إضافة مكملات قوية.",
                zatouna: "اهتمامك بصحة أعصابك وقدمك لا يقل أهمية عن تنظيم السكر.",
                supps: [
                    { t: "B-Complex", a: "B1, B6, B12", d: "حبة يومياً", b: "حماية الأعصاب", tm: "بعد الفطار", br: "iRemedies iB-Complex | Neurobion" },
                    { t: "كروميوم", a: "Picolinate", d: "200 mcg", b: "تنظيم الأنسولين", tm: "قبل الأكل", br: "iRemedies iChromium | Avernus" },
                    { t: "ألفا ليبويك", a: "ALA", d: "600 مجم", b: "التهاب الأعصاب", tm: "على معدة فارغة", br: "ThioGamma | iRemedies" }
                ]
            }
        ];

        function init() {
            const grid = document.getElementById('mainGrid');
            DATA.forEach(item => {
                const btn = document.createElement('div');
                btn.className = 'cond-btn';
                btn.innerText = item.name;
                btn.onclick = () => openDetails(item);
                grid.appendChild(btn);
            });
        }

        function openDetails(item) {
            document.getElementById('mainGrid').classList.add('hidden');
            document.getElementById('details-area').style.display = 'block';
            document.getElementById('display-name').innerText = item.name;
            document.getElementById('val-warn').innerText = "⚠️ " + item.warn;
            document.getElementById('val-zatouna').innerText = "🌟 " + item.zatouna;

            const suppList = document.getElementById('suppList');
            suppList.innerHTML = '';
            item.supps.forEach((s, idx) => {
                const tag = document.createElement('div');
                tag.className = 'supp-tag';
                tag.innerText = s.t;
                tag.onclick = () => showSuppInfo(s, tag);
                suppList.appendChild(tag);
            });
            document.getElementById('infoBox').style.display = 'none';
        }

        function showSuppInfo(s, element) {
            document.querySelectorAll('.supp-tag').forEach(t => t.classList.remove('selected'));
            element.classList.add('selected');
            
            document.getElementById('infoBox').style.display = 'block';
            document.getElementById('val-active').innerText = s.a;
            document.getElementById('val-dose').innerText = s.d;
            document.getElementById('val-time').innerText = s.tm;
            document.getElementById('val-benefit').innerText = s.b;
            document.getElementById('val-brands').innerText = s.br;
        }

        function backToList() {
            document.getElementById('mainGrid').classList.remove('hidden');
            document.getElementById('details-area').style.display = 'none';
        }

        init();
    </script>
</body>
</html>
