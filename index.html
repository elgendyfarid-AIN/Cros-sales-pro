<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PharmaCross Pro | المرجع الصيدلاني</title>
    <style>
        :root {
            --bg-light: #ffffff;
            --text-main: #1a1a1a;
            --primary-green: #2a5a48;
            --accent-blue: #0066cc;
            --warning-orange: #e67e22;
            --card-border: #e0e0e0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-light);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 15px;
            line-height: 1.6;
        }

        header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 3px solid var(--primary-green);
            margin-bottom: 20px;
        }

        h1 { font-size: 26px; color: var(--primary-green); font-weight: 800; }

        .search-box {
            width: 100%;
            padding: 15px;
            border: 2px solid var(--primary-green);
            border-radius: 10px;
            font-size: 18px;
            margin-bottom: 20px;
            background: #f9f9f9;
        }

        .category-tabs {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .tab {
            background: #eee;
            padding: 10px 20px;
            border-radius: 25px;
            white-space: nowrap;
            cursor: pointer;
            font-weight: bold;
        }

        .tab.active {
            background: var(--primary-green);
            color: white;
        }

        .condition-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
        }

        .condition-pill {
            background: #fff;
            border: 2px solid var(--card-border);
            padding: 15px 10px;
            border-radius: 12px;
            text-align: center;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
        }

        /* Card Full View */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            z-index: 1000;
            overflow-y: auto;
            padding: 20px;
        }

        .close-btn {
            background: var(--primary-green);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .section-title {
            color: var(--primary-green);
            border-bottom: 2px solid #eee;
            margin: 20px 0 10px;
            font-size: 20px;
        }

        .supp-item {
            background: #f4fbf8;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-right: 5px solid var(--primary-green);
        }

        .supp-item b { color: var(--accent-blue); }

        .warning-box {
            background: #fff5eb;
            border: 2px solid var(--warning-orange);
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }

        .zatouna {
            background: #eef2ff;
            padding: 15px;
            border-radius: 8px;
            border-right: 5px solid var(--accent-blue);
            font-style: italic;
        }
    </style>
</head>
<body>

    <header>
        <h1>المصاحب الصيدلاني الذكي 2026</h1>
        <p>مرجع الـ Cross-Selling الصيدلاني الكامل (Offline)</p>
    </header>

    <input type="text" class="search-box" id="search" placeholder="ابحث عن حالة طبية...">

    <div class="category-tabs">
        <div class="tab active" onclick="filterCat('chronic')">أمراض مزمنة</div>
        <div class="tab" onclick="filterCat('otc')">OTC</div>
        <div class="tab" onclick="filterCat('special')">حالات خاصة</div>
    </div>

    <div class="condition-grid" id="grid">
        </div>

    <div id="modal" class="modal">
        <button class="close-btn" onclick="closeModal()">⬅️ عودة للقائمة</button>
        <div id="modalContent"></div>
    </div>

    <script>
        const DATA = [
            {
                id: "hypertension",
                name: "ضغط الدم المرتفع",
                cat: "chronic",
                supps: [
                    {
                        name: "أوميجا 3 (Omega-3 Fish Oil)",
                        active: "حمض الـ EPA وحمض الـ DHA",
                        dose: "1000 - 2000 مجم يومياً",
                        benefit: "يحسن مرونة الشرايين ويقلل الدهون الثلاثية المسببة للضغط.",
                        timing: "وسط وجبة غنية بالدهون لزيادة الامتصاص.",
                        brands: ["iRemedies iUltimate Omega", "Avernus Omega-3", "Seven Seas", "Solgar"]
                    },
                    {
                        name: "مغنيسيوم (Magnesium)",
                        active: "Magnesium Glycinate / Citrate",
                        dose: "200 - 400 مجم يومياً",
                        benefit: "باسط طبيعي للأوعية الدموية ومنظم لضربات القلب.",
                        timing: "يُفضل قبل النوم لزيادة الاسترخاء.",
                        brands: ["iRemedies iMagnesium Glycinate", "Bio-Magnesium", "Jamieson"]
                    }
                ],
                devices: ["جهاز ضغط ديجيتال (Omron / Beurer)", "بدائل ملح الصوديوم (NoSalt)"],
                warnings: "تجنب تماماً المسكنات (NSAIDs) مثل البروفين، وتجنب أدوية البرد التي تحتوي على سودوفيدرين.",
                zatouna: "قل للمريض: ضغطك مضبوط بسبب التزامك بالدواء، فلا توقفه أبداً لأن الضغط (قاتل صامت) لا يعطي أعراضاً دائماً."
            }
            // سيتم إضافة الـ 90 حالة هنا بنفس هذا النمط
        ];

        function renderGrid(filter = 'chronic') {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            DATA.filter(item => item.cat === filter).forEach(item => {
                grid.innerHTML += `<div class="condition-pill" onclick="openModal('${item.id}')">${item.name}</div>`;
            });
        }

        function openModal(id) {
            const item = DATA.find(i => i.id === id);
            const content = document.getElementById('modalContent');
            content.innerHTML = `
                <h1 style="margin-bottom:20px">${item.name}</h1>
                <div class="section-title">💊 المكملات الموصى بها</div>
                ${item.supps.map(s => `
                    <div class="supp-item">
                        <p><b>المكمل:</b> ${s.name}</p>
                        <p><b>المادة الفعالة:</b> ${s.active}</p>
                        <p><b>التركيز:</b> ${s.dose}</p>
                        <p><b>الفائدة:</b> ${s.benefit}</p>
                        <p><b>التوقيت:</b> ${s.timing}</p>
                        <p><b>خيارات متوفرة:</b> ${s.brands.join(' | ')}</p>
                    </div>
                `).join('')}
                <div class="section-title">🩺 الأجهزة والعناية المرافقة</div>
                <ul style="padding-right:20px">${item.devices.map(d => `<li>${d}</li>`).join('')}</ul>
                <div class="warning-box">
                    <b>⚠️ خط أحمر (تحذيرات):</b><br>${item.warnings}
                </div>
                <div class="zatouna">
                    <b>🌟 نصيحة الصيدلي (الزتونة):</b><br>${item.zatouna}
                </div>
            `;
            document.getElementById('modal').style.display = 'block';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        
        // التشغيل الأولي
        renderGrid();
    </script>
</body>
</html>
