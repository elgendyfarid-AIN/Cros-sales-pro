<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <title>Pharma Atlas Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"/>
    <style>
        :root{ --bg:#f0f6ff;--bg2:#fff;--bg3:#e8f0fb;--bg4:#d0ddf5; --tx:#0d1b3e;--tx2:#2d4070;--tx3:#6b7fa8; --gr:#0a6e50;--grl:#d4f5ea;--grb:#7dd9b8; --bl:#1a4db8;--bll:#dde8ff;--blb:#93b4f0; --or:#b84a00;--orl:#fff3e0;--orb:#ffb74d; --pu:#6a1fcf;--pul:#f0e8ff;--pub:#c9a8f5; --tl:#006e82;--tll:#e0f7ff;--tlb:#7cd8f0; --rd:#c0281a;--sh:0 2px 12px rgba(10,30,80,.09);--r:14px}
        .dk{ --bg:#0a0f1e;--bg2:#111827;--bg3:#1a2035;--bg4:#252f48; --tx:#e8f0ff;--tx2:#a8bcdc;--tx3:#6a7a9a; --gr:#00c896;--grl:rgba(0,200,150,.1);--grb:rgba(0,200,150,.35); --bl:#58a6ff;--bll:rgba(88,166,255,.1);--blb:rgba(88,166,255,.35); --or:#ffb347;--orl:rgba(255,179,71,.1);--orb:rgba(255,179,71,.35); --pu:#c084fc;--pul:rgba(192,132,252,.1);--pub:rgba(192,132,252,.35); --tl:#38d2ef;--tll:rgba(56,210,239,.1);--tlb:rgba(56,210,239,.35); --rd:#ff6b6b;--sh:0 2px 12px rgba(0,0,0,.3)}
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{background:var(--bg);color:var(--tx);font-family:'Cairo',sans-serif;min-height:100vh;transition:background .25s,color .25s}
        body.ar{direction:rtl} body.en{direction:ltr}
        .tb{background:var(--bg2);border-bottom:2px solid var(--grb);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:var(--sh)}
        .tbi{width:34px;height:34px;background:linear-gradient(135deg,var(--gr),var(--tl));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
        .tbn{font-size:14px;font-weight:900;color:var(--tx)}
        .tbs{font-size:10px;color:var(--tx3);font-weight:600}
        .tbr{display:flex;gap:7px;align-items:center}
        .lt{display:flex;border:1.5px solid var(--bg4);border-radius:9px;overflow:hidden}
        .lb{padding:5px 12px;font-size:11px;font-weight:700;border:none;background:transparent;color:var(--tx3);cursor:pointer;font-family:inherit}
        .lb.ac{background:var(--gr);color:#fff}
        .ib{width:34px;height:34px;border-radius:9px;border:1.5px solid var(--bg4);background:var(--bg3);color:var(--tx2);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit}
        .sw{padding:12px 14px 0;max-width:900px;margin:0 auto}
        .sb{display:flex;align-items:center;gap:8px;background:var(--bg2);border:2px solid var(--bg4);border-radius:var(--r);padding:9px 13px;box-shadow:var(--sh);transition:border .2s}
        .sb:focus-within{border-color:var(--gr)}
        .sb input{flex:1;border:none;background:transparent;color:var(--tx);font-size:13px;font-family:inherit;outline:none}
        .sr{max-width:900px;margin:6px auto 0;background:var(--bg2);border:1.5px solid var(--bg4);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;display:none;position:relative;z-index:100}
        .sr.on{display:block}
        .si{padding:9px 14px;cursor:pointer;border-bottom:1px solid var(--bg3);font-size:13px;color:var(--tx2);display:flex;justify-content:space-between}
        .scat{font-size:10px;color:var(--tx3);background:var(--bg3);padding:2px 6px;border-radius:5px}
        .stw{padding:12px 14px 0;max-width:900px;margin:0 auto;display:flex;gap:7px;overflow-x:auto;scrollbar-width:none}
        .stw::-webkit-scrollbar{display:none}
        .st{padding:7px 14px;border-radius:18px;border:1.5px solid var(--bg4);background:var(--bg2);color:var(--tx2);font-weight:700;font-size:12px;cursor:pointer;white-space:nowrap;font-family:inherit;flex-shrink:0;transition:all .2s}
        .st.ac{background:var(--gr);border-color:var(--gr);color:#fff}
        .cw{padding:12px 14px;max-width:900px;margin:0 auto}
        .cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:8px}
        .cc{background:var(--bg2);border:1.5px solid var(--bg4);border-radius:var(--r);padding:12px 10px;cursor:pointer;text-align:center;box-shadow:var(--sh);transition:all .2s}
        .dw{display:none;padding:0 14px 40px;max-width:900px;margin:0 auto;animation:su .3s ease}
        .dw.on{display:block}
        @keyframes su{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        .bk{display:flex;align-items:center;gap:6px;color:var(--gr);font-size:13px;font-weight:700;cursor:pointer;padding:10px 0}
        .dh{background:var(--bg2);border-radius:var(--r);padding:14px;margin-bottom:10px;box-shadow:var(--sh);border-right:4px solid var(--gr)}
        body.en .dh{border-right:none;border-left:4px solid var(--gr)}
        .dt{font-size:19px;font-weight:900}
        .ds{font-size:11px;color:var(--tx3);margin-top:3px}
        .ic{background:var(--bg2);border-radius:var(--r);padding:14px;margin-bottom:10px;box-shadow:var(--sh);border:1.5px solid var(--bg4)}
        .ich{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-bottom:10px;border-bottom:1.5px solid var(--bg3)}
        .ichi{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
        .icht{font-size:13px;font-weight:800}
        .ic.gr{border-color:var(--grb)}.ic.gr .ichi{background:var(--grl);color:var(--gr)}.ic.gr .icht{color:var(--gr)}
        .ic.bl{border-color:var(--blb)}.ic.bl .ichi{background:var(--bll);color:var(--bl)}.ic.bl .icht{color:var(--bl)}
        .ic.or{border-color:var(--orb)}.ic.or .ichi{background:var(--orl);color:var(--or)}.ic.or .icht{color:var(--or)}
        .ic.tl{border-color:var(--tlb)}.ic.tl .ichi{background:var(--tll);color:var(--tl)}.ic.tl .icht{color:var(--tl)}
        .ic.pu{border-color:var(--pub)}.ic.pu .ichi{background:var(--pul);color:var(--pu)}.ic.pu .icht{color:var(--pu)}
        .chips{display:flex;flex-wrap:wrap;gap:6px}
        .chip{padding:6px 12px;background:var(--grl);border:1.5px solid var(--grb);border-radius:18px;font-size:12px;font-weight:700;color:var(--gr);cursor:pointer;font-family:inherit}
        .chip.ac{background:var(--gr);color:#fff;border-color:var(--gr)}
        .sdp{background:var(--grl);border:1.5px solid var(--grb);border-radius:12px;padding:13px;margin-top:8px}
        .sdn{font-size:14px;font-weight:900;color:var(--gr);margin-bottom:8px}
        .sdg{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
        .sdgi{background:var(--bg2);border-radius:8px;padding:7px 10px}
        .sdgl{font-size:10px;color:var(--tx3);font-weight:700;margin-bottom:2px}
        .sdgv{font-size:12px;font-weight:700;color:var(--tx)}
        .sdf{font-size:12px;color:var(--tx2);line-height:1.75;background:var(--bg2);border-radius:8px;padding:8px 10px}
        .sdbr{font-size:11px;color:var(--bl);font-weight:700;margin-top:5px}
        .li{display:flex;gap:8px;padding:6px 0;border-bottom:1px solid var(--bg3);font-size:13px;color:var(--tx2);line-height:1.6}
        .lid{width:7px;height:7px;border-radius:50%;background:var(--bl);flex-shrink:0;margin-top:5px}
        .wi{display:flex;gap:8px;padding:6px 0;border-bottom:1px solid var(--orb);font-size:13px;color:var(--tx2);line-height:1.6}
        .wis{color:var(--rd);font-weight:700}
        .ph{background:var(--tll);border-radius:10px;padding:12px;border-right:3px solid var(--tl);font-size:13px;color:var(--tx);font-style:italic;font-weight:600}
        body.en .ph{border-right:none;border-left:3px solid var(--tl)}
        .sm{background:var(--pul);border-radius:10px;padding:12px;border-right:3px solid var(--pu);font-size:13px;color:var(--tx)}
        body.en .sm{border-right:none;border-left:3px solid var(--pu)}
    </style>
</head>
<body class="ar">
    <div class="tb">
        <div style="display:flex;align-items:center;gap:10px">
            <div class="tbi">💊</div>
            <div><div class="tbn" id="tbn">أطلس الصيدلاني</div><div class="tbs" id="tbs">مرجع Cross-Selling</div></div>
        </div>
        <div class="tbr">
            <div class="lt"><button class="lb ac" id="bAr" onclick="setL('ar')">ع</button><button class="lb" id="bEn" onclick="setL('en')">EN</button></div>
            <button class="ib" onclick="toggleDk()" id="dkb">🌙</button>
        </div>
    </div>
    <div class="sw">
        <div class="sb">🔍 <input id="si" type="text" oninput="doSearch()"/><span style="cursor:pointer" onclick="clrS()">✕</span></div>
        <div class="sr" id="sr"></div>
    </div>
    <div class="stw" id="stw"></div>
    <div class="cw" id="cw"><div class="cg" id="cg"></div></div>
    <div class="dw" id="dw"><div class="bk" onclick="goBack()"><span id="bkA">→</span> <span id="bkT">رجوع</span></div><div id="dc"></div></div>
    <script>
        let lang='ar',curSec='c',curCond=null,activeSuppIdx=null,dk=false;
        const DB={ar:{sections:[],L:{},conditions:{}},en:{sections:[],L:{},conditions:{}}};
        function setL(l){ lang=l; curSec='c'; curCond=null; activeSuppIdx=null; const L=getL(); document.body.className=(l==='ar'?'ar':'en')+(dk?' dk':''); document.getElementById('bAr').className='lb'+(l==='ar'?' ac':''); document.getElementById('bEn').className='lb'+(l==='en'?' ac':''); document.getElementById('tbn').textContent=L.logo; document.getElementById('tbs').textContent=L.sub; document.getElementById('si').placeholder=L.search; document.getElementById('bkT').textContent=L.back; document.getElementById('bkA').textContent=L.backA; showView('grid'); clrS(); renderSections(); renderGrid(); }
        function toggleDk(){ dk=!dk; document.body.classList.toggle('dk'); document.getElementById('dkb').textContent=dk?'☀️':'🌙'; }
        function getDB(){ return DB[lang]; } function getL(){ return getDB().L; }
        function renderSections(){ const L=getL(); const secs=getDB().sections; document.getElementById('stw').innerHTML=secs.map(s=>`<button class="st${s.id===curSec?' ac':''}" onclick="selectSec('${s.id}')">${s.icon} ${s.name}</button>`).join(''); }
        function selectSec(id){ curSec=id; curCond=null; activeSuppIdx=null; renderSections(); renderGrid(); showView('grid'); }
        function renderGrid(){ const conds=getDB().conditions[curSec]||[]; document.getElementById('cg').innerHTML=conds.map(c=>`<div class="cc" onclick="showDetail('${c.id}')"><div style="font-size:22px;margin-bottom:5px">${c.icon}</div><div style="font-size:12px;font-weight:700">${c.name}</div></div>`).join(''); }
        function showView(v){ if(v==='grid'){document.getElementById('cw').style.display='block';document.getElementById('dw').style.display='none';}else{document.getElementById('cw').style.display='none';document.getElementById('dw').style.display='block';document.getElementById('dw').classList.add('on');} }
        function showDetail(id){ const conds=getDB().conditions[curSec]||[]; const cond=conds.find(c=>c.id===id); if(!cond) return; curCond=cond; activeSuppIdx=null; renderDetail(); showView('detail'); window.scrollTo(0,0); }
        function toggleSupp(i){ activeSuppIdx=(activeSuppIdx===i?null:i); renderDetail(); }
        function goBack(){ curCond=null; activeSuppIdx=null; showView('grid'); }
        function clrS(){ document.getElementById('si').value=''; document.getElementById('sr').classList.remove('on'); }
        function doSearch(){ const q=document.getElementById('si').value.trim().toLowerCase(); const res=document.getElementById('sr'); if(!q){res.classList.remove('on');return;} const db=getDB(); const matches=[]; Object.entries(db.conditions).forEach(([secId,conds])=>{ const sec=db.sections.find(s=>s.id===secId); conds.forEach(c=>{ if(c.name.toLowerCase().includes(q)){matches.push({...c,secId,secName:sec?sec.name:secId});} }); }); if(!matches.length){res.classList.remove('on');return;} res.innerHTML=matches.slice(0,8).map(m=>`<div class="si" onclick="searchGo('${m.secId}','${m.id}')"><span>${m.icon} ${m.name}</span><span class="scat">${m.secName}</span></div>`).join(''); res.classList.add('on'); }
        function searchGo(s,c){ clrS(); curSec=s; renderSections(); showDetail(c); }
        function renderDetail(){
            const L=getL(); const c=curCond;
            const chips=c.supps.map((s,i)=>`<button class="chip${activeSuppIdx===i?' ac':''}" onclick="toggleSupp(${i})">${s.n}</button>`).join('');
            let suppHTML='';
            if(activeSuppIdx!==null){
                const s=c.supps[activeSuppIdx];
                suppHTML=`<div class="sdp"><div class="sdn">${s.n}</div><div class="sdg"><div class="sdgi"><div class="sdgl">${L.dose}</div><div class="sdgv">${s.d}</div></div><div class="sdgi"><div class="sdgl">${L.timing}</div><div class="sdgv">${s.t}</div></div></div><div class="sdf"><div>${s.f}</div><div class="sdbr">🏷️ ${L.brands}: ${s.b}</div></div></div>`;
            }
            const tipsH=(c.tips||[]).map(t=>`<div class="li"><div class="lid"></div><div>${t}</div></div>`).join('');
            const warnsH=(c.warns||[]).map(w=>`<div class="wi"><div class="wis">⚠️ ${w}</div></div>`).join('');
            document.getElementById('dc').innerHTML=`<div class="dh"><div class="dt">${c.icon} ${c.name}</div><div class="ds">${L.ref}</div></div><div class="ic gr"><div class="ich"><div class="icht">${L.cs}</div></div><div class="chips">${chips}</div>${suppHTML}</div><div class="ic bl"><div class="ich"><div class="icht">${L.tips}</div></div>${tipsH}</div><div class="ic or"><div class="ich"><div class="icht">${L.warns}</div></div>${warnsH}</div>${c.phrase?`<div class="ic tl"><div class="ph">${c.phrase}</div></div>`:''}${c.smart?`<div class="ic pu"><div class="sm">💡 ${c.smart}</div></div>`:''}`;
        }
        window.onload = () => {
            DB.ar.L = {

                ref: "المراجع: BNF | USP | UAE Drug Guide", cs: "المكملات المصاحبة", 
                tips: "نصائح صحية مبنية على الأدلة", warns: "تحذيرات وتفاعلات دوائية",

            ];
            DB.en.L = { 
                logo: "Pharma Atlas Pro", sub: "Cross-Selling Reference • BNF/USP/UAE",

                ref: "References: BNF | USP | UAE Drug Guide", cs: "Companion Supplements", 
                tips: "Evidence-Based Health Tips", warns: "Warnings & Drug Interactions", 
                phrase: "Professional Sales Phrase", smart: "Smart Additional Opportunity", 
                dose: "Dose", timing: "Timing", brands: "Suggested Brands", benefit: "Medical Benefit" 
            };
            DB.en.sections = [

                { id: "h", icon: "💆", name: "Hair Care" }, { id: "g", icon: "🌿", name: "General Health" } 
            ];
            setL('ar');
        };
        DB.ar.conditions = { c: [], o: [], s: [], sk: [], h: [], g: [] };

      DB.ar.conditions.c.push(

                supps: [
                    {n:"ماغنيسيوم جليسينات", d:"400mg", t:"مساءً", f:"يُرخّي العضلات الملساء في الأوعية الدموية ويُقلل النشاط العصبي الودّي.", b:"iRemedies | Avernus | Now"},
                    {n:"CoQ10 (Ubiquinol)", d:"200mg", t:"صباحاً مع وجبة دسمة", f:"يُحسّن وظيفة البطانة الوعائية ويُعوض النقص الناتج عن أدوية الكوليسترول.", b:"iRemedies | Avernus | Solgar"},
                    {n:"أوميغا 3 (High EPA)", d:"2000-4000mg", t:"وسط الغداء", f:"يُحسّن مرونة الشرايين ويُقلل مستويات الدهون الثلاثية والالتهاب الوعائي.", b:"Avernus TG | iRemedies | Now"},
                    {n:"فيتامين D3+K2", d:"5000 IU", t:"صباحاً مع وجبة", f:"K2 يُوجّه الكالسيوم للعظام ومنع تكلّس الشرايين، وD3 يُنظم نظام الـ RAAS.", b:"iRemedies | Avernus | Now"},
                    {n:"مستخلص الثوم (Aged)", d:"1200mg", t:"يومياً", f:"مُثبّط طبيعي لإنزيم ACE ويُعزز إنتاج أكسيد النيتريك الموسّع للأوعية.", b:"Kyolic Garlic | Now | Solgar"},
                    {n:"L-Arginine", d:"1000-2000mg", t:"على معدة فارغة", f:"سلف مباشر لأكسيد النيتريك الذي يُوسّع الشرايين فوراً ويُحسن التروية.", b:"Now | Nature's Bounty | Solgar"}
                ],
                tips: ["حمية DASH: تقليل الملح < 2300mg", "مشي 30 دقيقة × 5 أيام أسبوعياً", "تقليل الكافيين وإدارة التوتر"],
                warns: ["البوتاسيوم ممنوع مع أدوية ACEi (مثل Zestril)", "راقب الضغط عند البدء بـ CoQ10 بجرعات عالية"],
                phrase: "\"الماغنيسيوم والـ CoQ10 درع حماية لقلبك مع الدواء لضمان أفضل نتائج\"",

            {

                    {n:"حمض ألفا ليبويك (ALA)", d:"600mg", t:"صباحاً على الريق", f:"أقوى مضاد أكسدة لعلاج التهاب الأعصاب السكري وتحسين حساسية الأنسولين.", b:"iRemedies | Avernus | Now"},

                    {n:"ب-كومبلكس (منشط)", d:"حبة يومياً", t:"بعد الإفطار", f:"يحمي غمد الميالين للأعصاب من التلف الناتج عن ارتفاع السكر المزمن.", b:"iRemedies | Avernus | Neurobion"},

                tips: ["مشي 15 دقيقة بعد كل وجبة دسمة", "تجنب الرز الأبيض والعصائر المحلاة", "فحص القدمين يومياً"],

            {
