.dk{

--tx:#e8f0ff;--tx2:#a8bcdc;--tx3:#6a7a9a;

--or:#ffb347;--orl:rgba(255,179,71,.1);--orb:rgba(255,179,71,.35);
--pu:#c084fc;--pul:rgba(192,132,252,.1);--pub:rgba(192,132,252,.35);
--tl:#38d2ef;--tll:rgba(56,210,239,.1);--tlb:rgba(56,210,239,.35);
--rd:#ff6b6b;--sh:0 2px 12px rgba(0,0,0,.3)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--tx);font-family:'Cairo',sans-serif;min-height:100vh;transition:background .25s,color .25s}
body.ar{direction:rtl}body.en{direction:ltr}
/* TOPBAR */
.tb{background:var(--bg2);border-bottom:2px solid var(--grb);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:var(--sh)}
.tbi{width:34px;height:34px;background:linear-gradient(135deg,var(--gr),var(--tl));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.tbn{font-size:14px;font-weight:900;color:var(--tx)}
.tbs{font-size:10px;color:var(--tx3);font-weight:600}
.tbr{display:flex;gap:7px;align-items:center}
.lt{display:flex;border:1.5px solid var(--bg4);border-radius:9px;overflow:hidden}
.lb{padding:5px 12px;font-size:11px;font-weight:700;border:none;background:transparent;color:var(--tx3);cursor:pointer;font-family:inherit}
.lb.ac{background:var(--gr);color:#fff}
.ib{width:34px;height:34px;border-radius:9px;border:1.5px solid var(--bg4);background:var(--bg3);color:var(--tx2);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;border:1.5px solid var(--bg4)}
/* SEARCH */
.sw{padding:12px 14px 0;max-width:900px;margin:0 auto}
.sb{display:flex;align-items:center;gap:8px;background:var(--bg2);border:2px solid var(--bg4);border-radius:var(--r);padding:9px 13px;box-shadow:var(--sh);transition:border .2s}
.sb:focus-within{border-color:var(--gr)}
.sb input{flex:1;border:none;background:transparent;color:var(--tx);font-size:13px;font-family:inherit;outline:none}
.sb input::placeholder{color:var(--tx3)}
.sr{max-width:900px;margin:6px auto 0;background:var(--bg2);border:1.5px solid var(--bg4);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;display:none;position:relative;z-index:100}
.sr.on{display:block}
.si{padding:9px 14px;cursor:pointer;border-bottom:1px solid var(--bg3);font-size:13px;color:var(--tx2);display:flex;justify-content:space-between}
.si:hover{background:var(--grl)}
.scat{font-size:10px;color:var(--tx3);background:var(--bg3);padding:2px 6px;border-radius:5px}
/* SECTION TABS */
.stw{padding:12px 14px 0;max-width:900px;margin:0 auto;display:flex;gap:7px;overflow-x:auto;scrollbar-width:none}
.stw::-webkit-scrollbar{display:none}
.st{padding:7px 14px;border-radius:18px;border:1.5px solid var(--bg4);background:var(--bg2);color:var(--tx2);font-weight:700;font-size:12px;cursor:pointer;white-space:nowrap;font-family:inherit;flex-shrink:0;transition:all .2s}
.st.ac{background:var(--gr);border-color:var(--gr);color:#fff}
/* CONDITIONS GRID */
.cw{padding:12px 14px;max-width:900px;margin:0 auto}
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:8px}
.cc{background:var(--bg2);border:1.5px solid var(--bg4);border-radius:var(--r);padding:12px 10px;cursor:pointer;text-align:center;box-shadow:var(--sh);transition:all .2s}
.cc:hover,.cc.ac{border-color:var(--gr);background:var(--grl);transform:translateY(-1px)}
.ci{font-size:22px;margin-bottom:5px}
.cn{font-size:12px;font-weight:700;color:var(--tx);line-height:1.3}
/* DETAIL */
.dw{display:none;padding:0 14px 40px;max-width:900px;margin:0 auto;animation:su .3s ease}
.dw.on{display:block}
@keyframes su{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.bk{display:flex;align-items:center;gap:6px;color:var(--gr);font-size:13px;font-weight:700;cursor:pointer;padding:10px 0}
.dh{background:var(--bg2);border-radius:var(--r);padding:14px;margin-bottom:10px;box-shadow:var(--sh);border-right:4px solid var(--gr)}
body.en .dh{border-right:none;border-left:4px solid var(--gr)}
.dt{font-size:19px;font-weight:900}
.ds{font-size:11px;color:var(--tx3);margin-top:3px}

.ich{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-bottom:10px;border-bottom:1.5px solid var(--bg3)}
.ichi{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.icht{font-size:13px;font-weight:800}
.ic.gr{border-color:var(--grb)}.ic.gr .ichi{background:var(--grl);color:var(--gr)}.ic.gr .icht{color:var(--gr)}
.ic.bl{border-color:var(--blb)}.ic.bl .ichi{background:var(--bll);color:var(--bl)}.ic.bl .icht{color:var(--bl)}
.ic.or{border-color:var(--orb)}.ic.or .ichi{background:var(--orl);color:var(--or)}.ic.or .icht{color:var(--or)}
.ic.tl{border-color:var(--tlb)}.ic.tl .ichi{background:var(--tll);color:var(--tl)}.ic.tl .icht{color:var(--tl)}
.ic.pu{border-color:var(--pub)}.ic.pu .ichi{background:var(--pul);color:var(--pu)}.ic.pu .icht{color:var(--pu)}

.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:6px 12px;background:var(--grl);border:1.5px solid var(--grb);border-radius:18px;font-size:12px;font-weight:700;color:var(--gr);cursor:pointer;font-family:inherit;transition:all .2s}
.chip:hover{background:var(--gr);color:#fff;border-color:var(--gr)}
.chip.ac{background:var(--gr);color:#fff;border-color:var(--gr)}

.sdp{background:var(--grl);border:1.5px solid var(--grb);border-radius:12px;padding:13px;margin-top:8px;animation:fd .2s ease}

.sdn{font-size:14px;font-weight:900;color:var(--gr);margin-bottom:8px}
.sdg{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.sdgi{background:var(--bg2);border-radius:8px;padding:7px 10px}
.sdgl{font-size:10px;color:var(--tx3);font-weight:700;margin-bottom:2px}
.sdgv{font-size:12px;font-weight:700;color:var(--tx)}
.sdf{font-size:12px;color:var(--tx2);line-height:1.75;background:var(--bg2);border-radius:8px;padding:8px 10px}
.sdbr{font-size:11px;color:var(--bl);font-weight:700;margin-top:5px;line-height:1.6}

.li{display:flex;gap:8px;padding:6px 0;border-bottom:1px solid var(--bg3);font-size:13px;color:var(--tx2);line-height:1.6}
.li:last-child{border:none}
.lid{width:7px;height:7px;border-radius:50%;background:var(--bl);flex-shrink:0;margin-top:5px}
.wi{display:flex;gap:8px;padding:6px 0;border-bottom:1px solid var(--orb);font-size:13px;color:var(--tx2);line-height:1.6}
.wi:last-child{border:none}
.wic{font-size:14px;flex-shrink:0}

.sm{background:var(--pul);border-radius:10px;padding:12px;border-right:3px solid var(--pu);font-size:13px;color:var(--tx);line-height:1.7}
body.en .sm{border-right:none;border-left:3px solid var(--pu)}
.empty{text-align:center;padding:50px;color:var(--tx3);grid-column:1/-1}
.eicon{font-size:40px;margin-bottom:10px}

</head>

// ═══════════════════════
// APP STATE & LOGIC
// ═══════════════════════
let lang='ar', curSec='c', curCond=null, activeSuppIdx=null, dk=false;

function getDB(){ return DB[lang]; }
function getL(){ return getDB().L; }

function setL(l){
  lang=l; curSec='c'; curCond=null; activeSuppIdx=null;
  const L=getL();
  document.body.className=(l==='ar'?'ar':'en')+(dk?' dk':'');
  document.getElementById('bAr').className='lb'+(l==='ar'?' ac':'');
  document.getElementById('bEn').className='lb'+(l==='en'?' ac':'');
  document.getElementById('tbn').textContent=L.logo;
  document.getElementById('tbs').textContent=L.sub;
  document.getElementById('si').placeholder=L.search;
  document.getElementById('bkT').textContent=L.back;
  document.getElementById('bkA').textContent=L.backA;
  showView('grid');
  document.getElementById('sr').classList.remove('on');
  document.getElementById('si').value='';
  renderSections(); renderGrid();
  localStorage.setItem('pa_lang',l);
}

function toggleDk(){
  dk=!dk;
  document.body.className=(lang==='ar'?'ar':'en')+(dk?' dk':'');
  document.getElementById('dkb').textContent=dk?'☀️':'🌙';
  localStorage.setItem('pa_dk',dk);
}

function renderSections(){
  const L=getL();
  const secs=getDB().sections;
  document.getElementById('stw').innerHTML=secs.map(s=>
    `<button class="st${s.id===curSec?' ac':''}" onclick="selectSec('${s.id}')">${s.icon} ${s.name}</button>`
  ).join('');
}

function selectSec(id){
  curSec=id; curCond=null; activeSuppIdx=null;
  renderSections(); renderGrid();
  showView('grid');
}

function renderGrid(){
  const conds=getDB().conditions[curSec]||[];
  if(!conds.length){
    document.getElementById('cg').innerHTML=`<div class="empty"><div class="eicon">🚧</div><div>قريباً</div></div>`;
    return;
  }
  document.getElementById('cg').innerHTML=conds.map(c=>
    `<div class="cc${curCond&&curCond.id===c.id?' ac':''}" onclick="showDetail('${c.id}')">
      <div class="ci">${c.icon}</div>
      <div class="cn">${c.name}</div>
    </div>`
  ).join('');
}

function showView(v){
  const cw=document.getElementById('cw');
  const dw=document.getElementById('dw');
  if(!cw||!dw) return;
  if(v==='grid'){cw.style.display='block';dw.classList.remove('on');dw.style.display='none';}
  else{cw.style.display='none';dw.classList.add('on');dw.style.display='block';}
}

function showDetail(condId){
  const conds=getDB().conditions[curSec]||[];
  const cond=conds.find(c=>c.id===condId);
  if(!cond) return;
  curCond=cond; activeSuppIdx=null;
  renderGrid();
  renderDetail();
  showView('detail');
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderDetail(){
  const L=getL();
  const c=curCond;
  // Build chips
  const chips=c.supps.map((s,i)=>
    `<button class="chip${activeSuppIdx===i?' ac':''}" onclick="toggleSupp(${i})">${s.n}</button>`
  ).join('');

  // Build supp panel
  let suppPanel='';
  if(activeSuppIdx!==null){
    const s=c.supps[activeSuppIdx];
    suppPanel=`<div class="sdp">
      <div class="sdn">${s.n}</div>
      <div class="sdg">
        <div class="sdgi"><div class="sdgl">📊 ${L.dose}</div><div class="sdgv">${s.d}</div></div>
        <div class="sdgi"><div class="sdgl">⏰ ${L.timing}</div><div class="sdgv">${s.t}</div></div>
      </div>
      <div class="sdf">
        <div>${s.f}</div>
        <div class="sdbr">🏷️ ${L.brands}:<br>${s.b}</div>
      </div>
    </div>`;
  }

  // Tips
  const tipsH=(c.tips||[]).map(t=>`<div class="li"><div class="lid"></div><div>${t}</div></div>`).join('');

  // Warnings
  const warnsH=(c.warns||[]).map(w=>{
    const sev=w.startsWith('!');
    const txt=sev?w.substring(1):w;
    return `<div class="wi"><div class="wic">${sev?'🚨':'⚠️'}</div><div class="${sev?'wis':''}">${txt}</div></div>`;
  }).join('');

  document.getElementById('dc').innerHTML=`
    <div class="dh">
      <div class="dt">${c.icon} ${c.name}</div>
      <div class="ds">${L.ref}</div>
    </div>
    <div class="ic gr">
      <div class="ich"><div class="ichi">🎯</div><div class="icht">${L.cs}</div></div>
      <div class="chips">${chips}</div>
      ${suppPanel}
    </div>
    ${tipsH?`<div class="ic bl">
      <div class="ich"><div class="ichi">🌿</div><div class="icht">${L.tips}</div></div>
      ${tipsH}
    </div>`:''}
    ${warnsH?`<div class="ic or">
      <div class="ich"><div class="ichi">⚠️</div><div class="icht">${L.warns}</div></div>
      ${warnsH}
    </div>`:''}
    ${c.phrase?`<div class="ic tl">
      <div class="ich"><div class="ichi">📋</div><div class="icht">${L.phrase}</div></div>
      <div class="ph">${c.phrase}</div>
    </div>`:''}
    ${c.smart?`<div class="ic pu">
      <div class="ich"><div class="ichi">💡</div><div class="icht">${L.smart}</div></div>
      <div class="sm">${c.smart}</div>
    </div>`:''}
  `;
}

function toggleSupp(idx){
  activeSuppIdx=(activeSuppIdx===idx?null:idx);
  renderDetail();
}

function goBack(){
  curCond=null; activeSuppIdx=null;
  showView('grid');
  renderGrid();
}

// SEARCH
function doSearch(){
  const q=document.getElementById('si').value.trim().toLowerCase();
  const res=document.getElementById('sr');
  if(!q){res.classList.remove('on');return;}
  const db=getDB();
  const matches=[];
  Object.entries(db.conditions).forEach(([secId,conds])=>{
    const sec=db.sections.find(s=>s.id===secId);
    conds.forEach(c=>{
      if(c.name.toLowerCase().includes(q)||c.id.includes(q)){
        matches.push({...c,secId,secName:sec?sec.name:secId});
      }
    });
  });
  if(!matches.length){res.classList.remove('on');return;}
  res.innerHTML=matches.slice(0,8).map(m=>
    `<div class="si" onclick="searchGo('${m.secId}','${m.id}')">
      <span>${m.icon} ${m.name}</span>
      <span class="scat">${m.secName}</span>
    </div>`
  ).join('');
  res.classList.add('on');
}

function searchGo(secId,condId){
  document.getElementById('sr').classList.remove('on');
  document.getElementById('si').value='';
  curSec=secId; curCond=null; activeSuppIdx=null;
  renderSections();
  showDetail(condId);
}

function clrS(){
  document.getElementById('si').value='';
  document.getElementById('sr').classList.remove('on');
}

// INIT
window.onload=()=>{
  const savedDk=localStorage.getItem('pa_dk')==='true';
  if(savedDk){dk=true;document.getElementById('dkb').textContent='☀️';}
  const savedL=localStorage.getItem('pa_lang')||'ar';
  setL(savedL);
};

document.addEventListener('click',e=>{
  if(!e.target.closest('.sb')&&!e.target.closest('.sr'))
    document.getElementById('sr').classList.remove('on');
});
</script>
